plugins {
    id 'java'
    id 'checkstyle'
}

def ghidraDir = file(properties['ghidra.install.dir'] ?: '/Users/anakin/Documents/ghidra_12.0.4_PUBLIC')

repositories {
    mavenCentral()
}

dependencies {
    implementation files("${ghidraDir}/Ghidra/Framework/Utility/lib/Utility.jar")
    implementation files("${ghidraDir}/Ghidra/Framework/Generic/lib/Generic.jar")
    implementation files("${ghidraDir}/Ghidra/Framework/DB/lib/DB.jar")
    implementation files("${ghidraDir}/Ghidra/Framework/SoftwareModeling/lib/SoftwareModeling.jar")
    implementation files("${ghidraDir}/Ghidra/Framework/Project/lib/Project.jar")
    implementation fileTree(dir: "${ghidraDir}/Ghidra", include: '**/lib/*.jar')

    testImplementation 'org.junit.jupiter:junit-jupiter-api:5.10.2'
    testImplementation 'org.junit.jupiter:junit-jupiter-params:5.10.2'
    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine:5.10.2'
    testImplementation 'org.mockito:mockito-core:5.11.0'
}

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

test {
    useJUnitPlatform()
    jvmArgs += ['--add-opens', 'java.base/java.lang=ALL-UNNAMED']
}

checkstyle {
    toolVersion = '10.15.0'
    configFile = file('config/checkstyle/checkstyle.xml')
    maxErrors = 0
    maxWarnings = 0
}

tasks.register('lint') {
    dependsOn checkstyleMain, checkstyleTest
}

// Read Ghidra's own version from application.properties so Extension.properties
// matches the installed Ghidra version (required for the extension to load).
def ghidraAppProps = new Properties()
def ghidraAppPropsFile = file("${ghidraDir}/Ghidra/application.properties")
if (ghidraAppPropsFile.exists()) {
    ghidraAppPropsFile.withInputStream { ghidraAppProps.load(it) }
}
def ghidraVersion = ghidraAppProps.getProperty('application.version', '12.0.4')
def extensionVersion = project.findProperty('extension.version') ?: ghidraVersion

// Process Extension.properties to substitute version tokens
tasks.register('processExtensionProperties', Copy) {
    from 'src/main/resources/Extension.properties'
    into layout.buildDirectory.dir('extension-meta')
    filter { line ->
        line.replace('@extension.name@', project.name)
            .replace('@extension.version@', extensionVersion)
    }
}

// Ghidra extension packaging
// Produces a ZIP with the layout Ghidra expects:
//   ark-ghidra/
//     lib/ark-ghidra.jar
//     Extension.properties
//     Module.manifest
//     data/languages/...
//     data/buildLanguage.xml
//     data/sleighArgs.txt
tasks.register('buildExtension', Zip) {
    dependsOn jar, processExtensionProperties
    archiveBaseName = project.name
    archiveVersion = extensionVersion
    destinationDirectory = layout.buildDirectory.dir('dist')

    into(project.name) {
        from(jar.archiveFile) {
            into 'lib'
        }
        from(layout.buildDirectory.dir('extension-meta')) {
            include 'Extension.properties'
        }
        from('src/main/resources') {
            include 'Module.manifest'
        }
        from('data/languages') {
            into 'data/languages'
            include '*.ldefs'
            include '*.cspec'
            include '*.pspec'
            include '*.opinion'
            include '*.slaspec'
            include '*.sinc'
            include '*.sla'
        }
        from('data') {
            into 'data'
            include 'buildLanguage.xml'
            include 'sleighArgs.txt'
        }
    }
}

// Alias for convenience
tasks.register('distZip') {
    dependsOn buildExtension
}
